services:
  claude:
    name: "Claude (Anthropic)"
    type: statuspage
    base_url: "https://status.claude.com"
    discord_channel: dn-claude
    downdetector:
      br: "chatbot-anthropic"

  openai:
    name: "ChatGPT (OpenAI)"
    type: statuspage
    base_url: "https://status.openai.com"
    discord_channel: dn-openai
    downdetector:
      br: "chatgpt"
      global: "chatgpt"

  gemini:
    name: "Gemini (Google)"
    type: google
    base_url: "https://status.google.com"
    discord_channel: dn-gemini
    downdetector:
      br: "google"
      global: "google"

  office365:
    name: "Office 365 / Teams"
    type: microsoft
    base_url: "https://status.office.com"
    discord_channel: dn-microsoft
    downdetector:
      br: "microsoft-office-365"
      global: "microsoft-office-365"

  azure:
    name: "Azure"
    type: azure
    base_url: "https://status.azure.com"
    discord_channel: dn-microsoft
    downdetector:
      br: "microsoft-azure"
      global: "microsoft-azure"

  aws:
    name: "AWS"
    type: aws
    base_url: "https://health.aws.amazon.com/health/status"
    discord_channel: dn-cloud
    downdetector:
      br: "amazon-web-services"
      global: "amazon-web-services"

  gcp:
    name: "GCP"
    type: google_cloud
    base_url: "https://status.cloud.google.com"
    discord_channel: dn-cloud
    downdetector:
      br: "google-cloud"
      global: "google-cloud"

  cloudflare:
    name: "Cloudflare"
    type: statuspage
    base_url: "https://www.cloudflarestatus.com"
    discord_channel: dn-cloud
    downdetector:
      br: "cloudflare"
      global: "cloudflare"

  hetzner:
    name: "Hetzner"
    type: statuspage
    base_url: "https://status.hetzner.com"
    discord_channel: dn-cloud
    downdetector:
      global: "hetzner-online"

  github:
    name: "GitHub"
    type: statuspage
    base_url: "https://githubstatus.com"
    discord_channel: dn-dev
    downdetector:
      br: "github"
      global: "github"

  discord:
    name: "Discord"
    type: statuspage
    base_url: "https://discordstatus.com"
    discord_channel: dn-dev
    downdetector:
      br: "discord"
      global: "discord"

thresholds:
  downdetector_spike_ratio: 5.0
  downdetector_baseline_hours: 24
  request_timeout: 10
  retry_attempts: 3
  retry_backoff: 2

discord:
  mention: "@here"
  timezone: "America/Sao_Paulo"
  delay_between_webhooks: 1

# Canais Discord disponíveis. Adicione novos canais aqui ao criar no servidor.
channels:
  - dn-claude
  - dn-openai
  - dn-gemini
  - dn-microsoft
  - dn-cloud
  - dn-dev
  - dn-geral
