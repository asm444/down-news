name: Down News Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Configurar git
        run: |
          git config user.name "down-news[bot]"
          git config user.email "down-news[bot]@users.noreply.github.com"

      - name: Executar monitor
        run: python monitor.py
        env:
          DISCORD_WEBHOOK_DN_CLAUDE: ${{ secrets.DISCORD_WEBHOOK_DN_CLAUDE }}
          DISCORD_WEBHOOK_DN_OPENAI: ${{ secrets.DISCORD_WEBHOOK_DN_OPENAI }}
          DISCORD_WEBHOOK_DN_GEMINI: ${{ secrets.DISCORD_WEBHOOK_DN_GEMINI }}
          DISCORD_WEBHOOK_DN_MICROSOFT: ${{ secrets.DISCORD_WEBHOOK_DN_MICROSOFT }}
          DISCORD_WEBHOOK_DN_CLOUD: ${{ secrets.DISCORD_WEBHOOK_DN_CLOUD }}
          DISCORD_WEBHOOK_DN_DEV: ${{ secrets.DISCORD_WEBHOOK_DN_DEV }}
          DISCORD_WEBHOOK_DN_GERAL: ${{ secrets.DISCORD_WEBHOOK_DN_GERAL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
